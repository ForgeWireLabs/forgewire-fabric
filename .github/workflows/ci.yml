name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets

  python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin + test deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-asyncio fastapi httpx uvicorn pydantic pynacl
      - name: Build PyO3 extension
        run: maturin develop --release -m crates/fabric-py/Cargo.toml
      - name: Run tests
        env:
          PYTHONPATH: python
        run: pytest tests/ -q --asyncio-mode=auto

name: release-vsix

# Build the VS Code extension VSIX on tag push and attach it to the GitHub
# Release. Does NOT publish to the VS Code Marketplace; that is a manual step
# requiring a publisher PAT.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Package VSIX
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package
        run: npx vsce package --allow-missing-repository --out forgewire.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgewire-vsix
          path: vscode/forgewire.vsix

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: vscode/forgewire.vsix
